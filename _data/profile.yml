short_bio: >-
  <p>  
    I am a Researcher at <strong>Alibaba (Beijing)</strong> specializing in <strong>Ranking & Recommendation Systems and Supply Chain Optimization</strong>. My work focuses on designing and deploying robust, large-scale recommendation engines that power diverse, high-concurrency commercial ecosystems. I am deeply passionate about pushing the frontiers of Deep Learning to solve complex challenges in user intent modeling, multi-task learning, cross-domain transfer learning, and large-scale revenue optimization.
  </p>
  <p>
    I hold an <strong>M.S.</strong> in Computer Architecture from the Institute of Computing Technology (<strong>ICT</strong>), University of Chinese Academy of Sciences (<strong>UCAS</strong>), and a B.S. in Software Engineering from Shandong University (<strong>SDU</strong>). Beyond my core responsibilities, I am an active member of the global research community, serving as a regular Program Committee member and reviewer for premier AI and data mining conferences, including KDD, RecSys, and SIGIR. Throughout my career, I have remained committed to bridging the gap between cutting-edge algorithmic innovation and real-world industrial impact, consistently delivering measurable improvements in both user experience and business efficiency. I thrive on transforming theoretical research into scalable solutions that drive sustainable business growth and long-term competitive advantage
  </p>

